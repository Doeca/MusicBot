    <script type="text/javascript">
        function checkform() {
            let botid = document.getElementById("botid").value
            let card = document.getElementById("card").value;
            let maxList = document.getElementById("maxList").value;
            let groups = Array()
            gids = document.getElementById("groups").value;
            gids = gids.replaceAll("，", ",");
            gid = gids.split(",")
            gid.forEach(element => {
                console.log(element)
                groups.push(parseInt(element))
            });


            amStart = document.getElementById("stAMstart").value.split(":")
            pmStart = document.getElementById("stPMstart").value.split(":")
            amStop = document.getElementById("stAMstop").value.split(":")
            pmStop = document.getElementById("stPMstop").value.split(":")
            let set_time = [parseInt(amStart[0]), parseInt(amStart[1]), parseInt(pmStart[0]), parseInt(pmStart[1]), parseInt(amStop[0]), parseInt(amStop[1]), parseInt(pmStop[0]), parseInt(pmStop[1])]
            console.log(set_time)
            let dby = { id: parseInt(botid), groups: groups, card: card, maxList: maxList, set_time: set_time };
            let res = fetch(`{{apiUrl}}/changeSettings`, {
                headers: {
                    "Content-Type": "application/json",
                }, method: "POST", mode: "cors", body: JSON.stringify(dby)
            }).then(res => {
                res.json().then(resp => {
                    alert(JSON.stringify(resp))
                })
            }).catch(err => { })


            //console.log(resp);
            //alert(JSON.stringify(resp))
            return false;
        }
        function handleTime(s) {
            a = s.split(":")
            if (a[0].length == 1)
                a[0] = '0' + a[0]
            if (a[1].length == 1)
                a[1] = '0' + a[1]
            return `${a[0]}:${a[1]}`
        }
        async function read() {
            let botid = document.getElementById("botid").value
            let res = await fetch(`{{apiUrl}}/getSettings?botid=${botid}`, { mode: "cors" }).catch(err => { })
            let resp = await res.json();
            let gids = ""
            for (i = 0; i < resp.groups.length; i++) {
                gids = gids + "," + resp.groups[i]
            }
            gids = gids.substring(1, gids.length)
            document.getElementById("card").value = resp.card
            document.getElementById("maxList").value = resp.maxList
            document.getElementById("groups").value = gids
            document.getElementById("stAMstart").value = handleTime(`${resp.set_time[0]}:${resp.set_time[1]}`)
            document.getElementById("stPMstart").value = handleTime(`${resp.set_time[2]}:${resp.set_time[3]}`)
            document.getElementById("stAMstop").value = handleTime(`${resp.set_time[4]}:${resp.set_time[5]}`)
            document.getElementById("stPMstop").value = handleTime(`${resp.set_time[6]}:${resp.set_time[7]}`)
        }
        read();
    </script>
